spring:
  datasource:
    url: jdbc:h2:~/librarydb;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: sa
    password: sa
    generate-unique-name: false

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    defer-datasource-initialization: false
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  sql:
    init:
      mode: always

  devtools:
    livereload:
      enabled: true
    restart:
      enabled: true