services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.13
    hostname: zookeeper
    container_name: zookeeper-library
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.13
    hostname: kafka
    container_name: kafka-library
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:19092,CONNECTIONS_FROM_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONNECTIONS_FROM_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: kafdrop-library
    ports:
      - "9000:9000"
    environment:
      JVM_OPTS: -Xms32M -Xmx64M
      SERVER_SERVLET_CONTEXTPATH: "/"
      KAFKA_BROKERCONNECT: kafka:19092
    depends_on:
      - kafka

  # -------------------------
  # App con perfil H2
  # -------------------------
  app-h2:
    image: sebashh26/library-app:v1
    container_name: library-app-h2
    environment:
      SPRING_PROFILES_ACTIVE: h2
      H2_URL: jdbc:h2:file:/data/librarydb;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
      KAFKA_HOST: kafka:19092
    ports:
      - "8080:8080"
    volumes:
      - ./h2/librarydb.mv.db:/data/librarydb.mv.db
      - ./h2/librarydb.trace.db:/data/librarydb.trace.db
    depends_on:
      - kafka

  # -------------------------
  # App con perfil MySQL
  # -------------------------
  app-mysql:
    image: sebashh26/library-app:v1
    container_name: library-app-mysql
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      host: mysqldb
      port: 3306
      database: librarybd
      password: toor
      KAFKA_HOST: kafka:19092
    ports:
      - "8081:8080"
    depends_on:
      - mysqldb
      - kafka

  # -------------------------
  # Base de datos MySQL con data inicial
  # -------------------------
  mysqldb:
    image: sebashh26/library-db:v1
    container_name: mysqldb-service
    environment:
      MARIADB_ROOT_PASSWORD: toor
      MARIADB_DATABASE: librarybd
    ports:
      - "3306:3306"
    volumes:
      - mysqldb_data:/var/lib/mysql

volumes:
  mysqldb_data: